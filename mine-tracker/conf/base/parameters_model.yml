model:
  features:
    - hora_sin
    - hora_cos
    - dia_sem_sin
    - dia_sem_cos
    - final_de_semana
    - playerCount_lag_24h
    - playerCount_lag_1h
    - playerCount_z
    - lag_24h_z
    - proporcao_rede
  target: target_24h
  test_size: 0.2
  random_state: 42
  winsorize_feature: pct_var_jogadores
  winsorize_p_low: 1
  winsorize_p_high: 99
  models_dir: "models"
  training:
    n_estimators: 100
    n_jobs: 2
